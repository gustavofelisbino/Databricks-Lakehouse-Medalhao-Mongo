bundle:
  name: pipeline_seguradora_medalhao

resources:
  jobs:
    pipeline_seguradora_medalhao:
      name: pipeline_seguradora_medalhao
      max_concurrent_runs: 1

      tasks:
        - task_key: setup
          notebook_task:
            notebook_path: ./notebooks/00_setup_ambiente.py
          max_retries: 1

        - task_key: landing
          depends_on:
            - task_key: setup
          notebook_task:
            notebook_path: ./notebooks/01_landing_extracao_mongo.py
            base_parameters:
              MONGODB_URI: "{{secrets/mongo/uri}}"
          max_retries: 1

        - task_key: bronze
          depends_on:
            - task_key: landing
          notebook_task:
            notebook_path: ./notebooks/02_bronze_ingestao.py
          max_retries: 1

        - task_key: silver
          depends_on:
            - task_key: bronze
          notebook_task:
            notebook_path: ./notebooks/03_silver_data_quality.py
          max_retries: 1

        - task_key: gold
          depends_on:
            - task_key: silver
          notebook_task:
            notebook_path: ./notebooks/04_gold_dimensional.py
          max_retries: 1

# targets:
#   dev:
#     default: true
#     workspace:
#       host: https://<seu-workspace>.cloud.databricks.com
# Descomente e ajuste o host acima ao usar `databricks bundle deploy`.
